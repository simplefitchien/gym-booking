<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡運動 - 場館導覽</title>
    <style>
        :root {
            --primary: #D4A373;
            --secondary: #FAEDCD;
            --text-main: #4A4238;
            --text-light: #B99768;
            --bg: #FEFAE0;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: "PingFang TC", "Noto Sans TC", sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            background: var(--secondary);
            margin: 15px 15px 0 15px;
            padding: 22px;
            text-align: center;
            border-radius: 25px 25px 0 0;
        }

        .header-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0;
        }

        .nav-tabs {
            display: flex;
            margin: 0 15px 15px 15px;
            background: #FFF;
            border-radius: 0 0 20px 20px;
            padding: 6px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }

        .tab {
            flex: 1;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            color: var(--text-light);
            cursor: pointer;
        }

            .tab.active {
                background: var(--primary);
                color: #FFFFFF;
            }

        #info-content {
            padding: 0 15px 80px 15px;
        }

        .info-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 15px;
            border: 1px solid #F5EBD0;
            box-shadow: 0 6px 15px rgba(212, 163, 115, 0.05);
        }

        .logo-circle {
            width: 50px;
            height: 50px;
            background: var(--secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 20px auto;
        }

        .venue-img {
            width: 100%;
            border-radius: 15px;
            margin-top: 5px;
        }

        /* --- 底部品牌圖片樣式 --- */
        .brand-footer {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1.5px solid var(--secondary);
            display: flex;
            justify-content: center;
        }

            .brand-footer img {
                width: 100%;
                max-width: 350px;
                height: auto;
                display: block;
            }

        /* 內容列表樣式 */
        .rule-item {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            font-size: 15px;
            line-height: 1.6;
        }

        .rule-num {
            background: var(--secondary);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 900;
            flex-shrink: 0;
        }

        .price-item {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px dashed var(--secondary);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="header-title">☀️ 場館導覽</h1>
    </div>

    <div class="nav-tabs">
        <div class="tab active" onclick="switchTab(this, 'intro')">探索空間</div>
        <div class="tab" onclick="switchTab(this, 'rules')">場館須知</div>
        <div class="tab" onclick="switchTab(this, 'price')">收費方案</div>
    </div>

    <div id="info-content">
        <div id="intro" class="tab-pane">
            <div class="info-card">
                <div class="logo-circle">👑</div>
                <img src="https://via.placeholder.com/600x400" class="venue-img" alt="場館照片">

                <div class="brand-footer">
                    <img src="pic/slogan.png" alt="極簡運動 - 品牌資訊">
                </div>
            </div>
        </div>

        <div id="rules" class="tab-pane" style="display:none;">
            <div class="info-card">
                <div class="logo-circle">📜</div>
                <div class="rule-item"><div class="rule-num">1</div><span>自由座課程，請自由入場。</span></div>
                <div class="rule-item"><div class="rule-num">2</div><span>預約制課程，請於上課前三小時完成預約/取消。</span></div>
                <div class="rule-item"><div class="rule-num">3</div><span>每週日開放下一週課程預約。</span></div>
                <div class="rule-item"><div class="rule-num">4</div><span>請換穿乾淨室內鞋進場 (瑜珈課程除外)。</span></div>
                <div class="rule-item"><div class="rule-num">5</div><span>教室內禁止飲食，保持整潔環境。</span></div>
                <div class="rule-item"><div class="rule-num">6</div><span>器材使用後請協助擦拭並歸位。</span></div>

                <div class="brand-footer">
                    <img src="pic/slogan.png" alt="極簡運動 - 品牌資訊">
                </div>
            </div>
        </div>

        <div id="price" class="tab-pane" style="display:none;">
            <div class="info-card">
                <div class="logo-circle">💰</div>
                <div class="price-item"><span>首次體驗</span><strong>$299/堂</strong></div>
                <div class="price-item"><span>課堂卡</span><strong>$50/點</strong></div>
                <div class="price-item"><span>自由座課程</span><strong>五點</strong></div>
                <div class="price-item"><span>預約制課程</span><strong>六點</strong></div>
                <div class="price-item" style="border-bottom: none;"><span>私人指導課程</span><strong>請洽簡老師</strong></div>

                <div class="brand-footer">
                    <img src="pic/slogan.png" alt="極簡運動 - 品牌資訊">
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(el, paneId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
            document.getElementById(paneId).style.display = 'block';
        }
    </script>
</body>
</html>
