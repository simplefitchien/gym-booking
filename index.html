<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>極簡運動 - 課程預約系統</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { 
      --primary: #8CB369;      /* 嫩草綠 (主動功能) */
      --secondary: #E3EAE2;    /* 淺色綠標頭 */
      --text-main: #344E41;    /* 森林深灰綠 */
      --text-light: #84A59D;   /* 次要資訊色 */
      --bg: #F8FAF8;           
      --card-bg: #FFFFFF;
      --cancel-color: #A5A5A5; /* 取消/關閉的輔助色 */
    }
    body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text-main); }
    
    /* --- Header：極致精簡、下排直角 --- */
    .header { 
      background: var(--secondary); 
      margin: 15px 15px 0 15px; 
      padding: 18px 20px;
      text-align: center;         
      border-radius: 25px 25px 0 0; 
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .header-title-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .header-icon { font-size: 24px; }
    .header-title { 
      font-size: 22px; 
      font-weight: 800; 
      letter-spacing: 1.5px; 
      margin: 0; 
      color: var(--text-main); 
    }
    .user-welcome { 
      font-size: 13px; 
      color: var(--text-light); 
      margin-top: 3px; 
      font-weight: 500;
    }

    /* 選單樣式：銜接 Header */
    .nav-tabs { 
      display: flex; 
      margin: 0 15px 15px 15px; 
      background: #FFF; 
      border-radius: 0 0 20px 20px; 
      padding: 6px; 
      box-shadow: 0 5px 15px rgba(0,0,0,0.02);
    }
    .tab { 
      flex: 1; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 12px; 
      font-weight: 700; font-size: 14px; color: var(--text-light); cursor: pointer; transition: 0.3s;
    }
    .tab.active { 
      background: var(--text-main); 
      color: white; 
    }

    /* 課程卡片 */
    #course-list { padding: 0 20px 80px 20px; }
    .card { 
      background: var(--card-bg); border-radius: 20px; padding: 18px; margin-bottom: 12px; 
      box-shadow: 0 4px 12px rgba(52, 78, 65, 0.04); border: 1px solid #E9EFE9;
    }
    .course-date { font-size: 0.85em; color: var(--text-light); font-weight: 800; margin-bottom: 4px; }
    .course-title { font-size: 1.25em; font-weight: 900; color: var(--text-main); margin: 3px 0; }
    .teacher-tag { 
      font-size: 0.85em; background: #F4F7F4; color: var(--text-main); padding: 4px 10px; border: 1px solid #D9E5D6; border-radius: 8px; font-weight: 700;
    }
    .course-detail { font-size: 0.85em; color: var(--text-light); margin-top: 6px; }
    .card-footer { margin-top: 15px; display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid #F0F4F0; }
    .capacity-link { color: var(--text-light); text-decoration: underline; cursor: pointer; font-size: 0.85em; }

    /* --- 按鈕樣式 --- */
    .btn-book { 
      width: 90px; height: 36px; border-radius: 18px; border: none; font-weight: 800; font-size: 0.85em; 
      cursor: pointer; transition: 0.2s;
    }
    .btn-active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(140, 179, 105, 0.25); }
    .btn-delete { 
      background: transparent; 
      color: var(--cancel-color); 
      border: 1px solid #DDD; 
      width: 90px;
    }
    .btn-full { background: #E0E0E0; color: white; cursor: not-allowed; }

    /* --- 彈窗優化 --- */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(52, 78, 65, 0.2); backdrop-filter: blur(4px); }
    .modal-content { background: #fff; margin: 35% auto; padding: 25px; border-radius: 25px; width: 75%; max-width: 300px; text-align: center; }
    .modal-list { text-align: left; margin: 15px 0; max-height: 180px; overflow-y: auto; line-height: 2.2; border-top: 1px solid #F0F4F0; padding-top: 12px; font-size: 14px; color: var(--text-main); }
    
    /* 修正確認視窗按鈕：等寬對稱設計 */
    .modal-btn-container {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .btn-modal-cancel, .btn-modal-confirm { 
      flex: 1;              /* 讓兩個按鈕平分空間 */
      padding: 12px; 
      border-radius: 15px; 
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      margin: 0;            /* 移除原有的 margin-auto */
    }
    .btn-modal-cancel { 
      border: 1px solid #EEE; 
      background: #F9F9F9; 
      color: var(--cancel-color); 
    }
    .btn-modal-confirm { 
      border: none; 
      background: var(--primary); 
      color: #fff; 
    }
    
    /* 旋轉動畫 */
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
   .btn-spinner { width: 18px; height: 18px; border: 2.5px solid rgba(0,0,0,0.05); border-top: 2.5px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title-container">
      <span class="header-icon">🌿</span>
      <h1 class="header-title">極簡運動</h1>
      <span class="header-icon">🧘</span>
    </div>
    <div id="status" class="user-welcome">載入中...</div>
  </div>
  
  <div class="nav-tabs">
    <div class="tab active" data-cat="肌力" onclick="changeTab(this)">肌力</div>
    <div class="tab" data-cat="有氧" onclick="changeTab(this)">有氧</div>
  </div>

  <div id="course-list">
    <div style="text-align:center; padding:100px 20px; color:var(--text-light);">
      <div class="btn-spinner" style="margin-bottom:10px;"></div>
      <div style="font-size:14px; letter-spacing:1px;">同步課表中...</div>
    </div>
  </div>

  <div id="userModal" class="modal">
    <div class="modal-content">
      <h3 style="margin-top:0; font-weight:900; color:var(--text-main);">預約名單</h3>
      <div id="modal-text" class="modal-list"></div>
      <button class="btn-modal-cancel" style="width:100%;" onclick="closeModal('userModal')">關閉</button>
    </div>
  </div>

  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <h3 style="margin-top:0; color:var(--text-light); font-weight:700; font-size:14px;">確認操作</h3>
      <p id="confirm-msg" style="font-size: 1.1em; font-weight: 800; color: var(--text-main); margin: 10px 0;"></p>
      <div class="modal-btn-container">
        <button class="btn-modal-cancel" onclick="closeModal('confirmModal')">取消</button>
        <button id="btn-do-action" class="btn-modal-confirm">確定</button>
      </div>
    </div>
  </div>

  <div id="resultModal" class="modal">
    <div class="modal-content">
      <span id="result-icon-box" style="font-size:50px; display:block; margin-bottom:10px;"></span>
      <h3 id="result-title" style="margin:0; font-weight:900;"></h3>
      <div id="result-content" style="font-size: 1em; margin: 15px 0; color: var(--text-main);"></div>
      <button class="btn-modal-confirm" style="width:100%; border-radius:15px;" onclick="location.reload()">確定</button>
    </div>
  </div>

  <script>
    const LIFF_ID = "2009018322-JGFORbhc"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyqqHMc1rSs9Ug1RS2WjS-HR3cXoePF6P8-iCvSzQa1ZPpDmQw2ogSA0ywLq84CVdxB/exec"; 
    let allCourses = [];

    window.onload = async function() {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); }
      else { 
        const profile = await liff.getProfile();
        document.getElementById('status').innerText = `您好，${profile.displayName}！準備好訓練了嗎？`;
        fetchData(profile.userId); 
      }
    };

    async function fetchData(userId) {
      try {
        const response = await fetch(`${GAS_URL}?userId=${userId}`);
        allCourses = await response.json();
        render(document.querySelector('.tab.active').getAttribute('data-cat'));
      } catch (e) { alert("讀取課表失敗"); }
    }

    function render(category) {
      const container = document.getElementById('course-list');
      container.innerHTML = '';
      const filtered = allCourses.filter(c => String(c["分類"]).trim() === String(category).trim());
      
      if (filtered.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:100px; color:#BDC3C7;">目前沒有相關課程</div>`;
        return;
      }

      const now = new Date();

      filtered.forEach(c => {
        const current = parseInt(c["目前人數"]) || 0, max = parseInt(c["上限"]) || 0;
        const dateStr = c["日期"] ? String(c["日期"]).split('T')[0] : "日期未定";
        const btnId = `btn-${c["課程ID"]}`;
        let btnHtml = "";

        let isTimeLocked = false;
        if (c["日期"] && c["時段"]) {
          const startTimeStr = String(c["時段"]).split(/[-~]/)[0].trim();
          const [hh, mm] = startTimeStr.split(':');
          const classStart = new Date(c["日期"]);
          classStart.setHours(parseInt(hh), parseInt(mm), 0, 0);
          if (classStart.getTime() - now.getTime() < 3 * 60 * 60 * 1000) { isTimeLocked = true; }
        }

        // --- 修正處：按鈕綁定完整的五項比對資訊 ---
        if (isTimeLocked) {
          btnHtml = `<button class="btn-book btn-full" style="font-size:0.85em;">已截止</button>`;
        } else if (c["isBooked"]) {
          btnHtml = `<button id="${btnId}" class="btn-book btn-delete" onclick="askAction('${c["課程ID"]}', 'delete', '${c["名稱"]}', '${dateStr}', '${c["時段"]}', '${c["星期"]}')">取消預約</button>`;
        } else {
          btnHtml = (current >= max) 
            ? `<button class="btn-book btn-full">滿額</button>` 
            : `<button id="${btnId}" class="btn-book btn-active" onclick="askAction('${c["課程ID"]}', 'book', '${c["名稱"]}', '${dateStr}', '${c["時段"]}', '${c["星期"]}')">立即預約</button>`;
        }

        container.innerHTML += `<div class="card">
          <div class="course-date">${dateStr} (${c["星期"]})</div>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="course-title">${c["名稱"]}</div>
            <div class="teacher-tag">${c["老師"]}</div>
          </div>
          <div class="course-detail">⏰ 時段：${c["時段"]}</div>
          <div class="card-footer">
            <div class="capacity-link" onclick="showUsers('${c["課程ID"]}', '${c["名稱"]}')">已預約 ${current} / ${max}</div>
            ${btnHtml}
          </div>
        </div>`;
      });
    }

    // --- 修正處：接收與傳遞完整的比對資訊 ---
    function askAction(id, action, name, date, time, day) {
      const modal = document.getElementById('confirmModal');
      document.getElementById('confirm-msg').innerText = (action === 'delete' ? '取消 ' : '預約 ') + date + ' ' + name;
      document.getElementById('btn-do-action').onclick = function() { 
        closeModal('confirmModal'); 
        executeAction(id, action, name, date, time, day); 
      };
      modal.style.display = 'block';
    }

    async function executeAction(id, action, name, date, time, day) {
      const btn = document.getElementById(`btn-${id}`);
      if (btn) { btn.disabled = true; btn.innerHTML = `<div class="btn-spinner"></div>`; }
      try {
        const profile = await liff.getProfile();
        // --- 修正處：將五項 Key 值封裝進 POST 請求 ---
        const response = await fetch(GAS_URL, { 
          method: "POST", 
          body: JSON.stringify({ 
            action, 
            courseId: id, 
            courseName: name, 
            courseDate: date, 
            courseTime: time, 
            courseDay: day, 
            userId: profile.userId, 
            userName: profile.displayName 
          }) 
        });
        const result = await response.json();
        const gasMsg = result.result;
        const iconBox = document.getElementById('result-icon-box');
        const titleEl = document.getElementById('result-title');
        
        if (gasMsg === "預約成功") {
          iconBox.innerText = "📝"; titleEl.innerText = "預約成功！"; titleEl.style.color = "var(--primary)";
        } else if (gasMsg === "取消成功") {
          iconBox.innerText = "🧹"; titleEl.innerText = "取消成功！"; titleEl.style.color = "var(--text-main)";
        } else {
          iconBox.innerText = "⚠️"; titleEl.innerText = "提醒"; titleEl.style.color = "#E67E22";
        }
        document.getElementById('result-content').innerText = (gasMsg.includes("成功") ? (date + ' ' + name) : gasMsg);
        document.getElementById('resultModal').style.display = 'block';
      } catch (err) { alert("連線異常"); location.reload(); }
    }

    async function showUsers(id, name) {
      const list = document.getElementById('modal-text');
      document.getElementById('userModal').style.display = 'block';
      list.innerHTML = `<div style="text-align:center; padding:20px;"><div class="btn-spinner"></div></div>`;
      try {
        const res = await fetch(`${GAS_URL}?action=getUsers&courseId=${id}`);
        const users = await res.json();
        list.innerHTML = (users && users.length > 0) ? users.map((u, i) => `${i + 1}. ${u}`).join('<br>') : "目前尚無人預約";
      } catch (err) { list.innerHTML = "❌ 查詢失敗"; }
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function changeTab(el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      render(el.getAttribute('data-cat'));
    }
  </script>
</body>
</html>
